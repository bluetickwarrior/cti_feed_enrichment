<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blue Tick Warrior — Threat Intelligence</title>

  <style>
    :root {
      color-scheme: dark;
      --background: #0a0d11;
      --surface: #10151b;
      --surface-raised: #151b23;
      --text: #eef2f7;
      --muted: #8d98a8;
      --line: #27303b;
      --accent: #5aa7ff;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--background);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    a {
      font: inherit;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(10, 13, 17, 0.96);
    }

    .header-inner {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      width: min(1440px, calc(100% - 40px));
      margin: auto;
      padding: 22px 0;
    }

    .brand {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .brand span {
      color: var(--accent);
    }

    .header-description {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: right;
    }

    main {
      display: grid;
      grid-template-columns: 220px minmax(0, 900px);
      justify-content: center;
      gap: 32px;
      width: min(1440px, calc(100% - 40px));
      margin: auto;
      padding: 32px 0 70px;
    }

    main.panel-open {
      grid-template-columns: 180px 210px minmax(0, 1fr);
      justify-content: stretch;
      gap: 20px;
    }

    #status {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
    }

    #vulnerability-index {
      position: sticky;
      top: 20px;
      align-self: start;
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding-right: 4px;
    }

    .index-title {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    #vulnerability-list {
      display: grid;
      border-top: 1px solid var(--line);
    }

    .vulnerability-link {
      padding: 11px 0;
      color: var(--muted);
      background: none;
      border: 0;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      text-align: left;
      cursor: pointer;
    }

    .vulnerability-link:hover,
    .vulnerability-link.active {
      color: #8fc5ff;
    }

    .vulnerability-link.active {
      padding-left: 9px;
      background: rgba(90, 167, 255, .12);
      border-left: 3px solid var(--accent);
    }

    #feed {
      border-top: 1px solid var(--line);
    }

    .feed-item {
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }

    .feed-item h2 {
      max-width: 800px;
      margin: 0 0 8px;
      font-size: clamp(20px, 2.5vw, 30px);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.15;
    }

    .metadata {
      margin-bottom: 13px;
      color: var(--muted);
      font-size: 12px;
    }

    .description {
      max-width: 760px;
      margin: 0;
      color: #c5ccd6;
      font-size: 15px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 13px;
      color: var(--background);
      background: var(--text);
      border: 1px solid var(--text);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .button:hover {
      color: var(--background);
      background: var(--accent);
      border-color: var(--accent);
    }

    .button.secondary {
      color: var(--text);
      background: transparent;
      border-color: var(--line);
    }

    .button.secondary:hover {
      color: var(--text);
      background: var(--surface-raised);
      border-color: #3a4654;
    }

    .button:disabled {
      color: var(--muted);
      background: var(--surface);
      border-color: var(--line);
      cursor: not-allowed;
    }

    .research-status {
      color: var(--muted);
      font-size: 12px;
    }

    #research-panel {
      display: none;
      position: sticky;
      top: 20px;
      align-self: start;
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
    }

    #research-panel.open {
      display: block;
    }

    .panel-header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 24px 28px 22px;
      background: rgba(16, 21, 27, 0.97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    #research-title {
      max-width: 1000px;
      margin: 0;
      padding-right: 50px;
      font-size: clamp(26px, 3vw, 44px);
      font-weight: 600;
      letter-spacing: -0.035em;
      line-height: 1.08;
    }

    #close-panel {
      position: absolute;
      top: 20px;
      right: 24px;
      width: 32px;
      height: 32px;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    #close-panel:hover {
      color: var(--text);
      border-color: #485464;
    }

    #research-result {
      padding: 0 28px 42px;
    }

    .research-section {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 28px;
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }

    .research-section h3 {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .research-content p {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .research-content p:last-child {
      margin-bottom: 0;
    }

    .field-status,
    .field-notes {
      color: var(--muted) !important;
      font-size: 12px !important;
    }

    .evidence {
      margin-top: 18px;
      padding: 14px 16px;
      background: var(--surface-raised);
      border-left: 2px solid var(--accent);
    }

    .evidence blockquote {
      margin: 0 0 10px;
      color: #d6dce5;
      font-size: 14px;
      line-height: 1.55;
    }

    .evidence a {
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .evidence a:hover {
      text-decoration: underline;
    }

    main.panel-open #status,
    main.panel-open .metadata,
    main.panel-open .description,
    main.panel-open .research-status,
    main.panel-open .button.secondary {
      display: none;
    }

    main.panel-open #feed {
      border-top-color: #394451;
    }

    main.panel-open .feed-item {
      padding: 14px 0;
    }

    main.panel-open .feed-item h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.4;
    }

    main.panel-open .feed-item.active {
      margin: 0 -10px;
      padding: 14px 10px;
      background: rgba(90, 167, 255, 0.12);
      border-left: 3px solid var(--accent);
    }

    main.panel-open .feed-item.active h2 {
      color: #8fc5ff;
    }

    main.panel-open .actions {
      display: block;
      margin-top: 9px;
    }

    main.panel-open .button {
      width: 100%;
      min-height: 30px;
      padding: 0 8px;
      font-size: 10px;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 850px) {
      .header-inner {
        display: block;
        width: calc(100% - 28px);
      }

      .header-description {
        margin-top: 8px;
        text-align: left;
      }

      main,
      main.panel-open {
        display: block;
        width: calc(100% - 28px);
      }

      #vulnerability-index {
        position: static;
        max-height: none;
        margin-bottom: 28px;
      }

      #research-panel.open {
        position: fixed;
        inset: 0;
        z-index: 20;
        max-height: none;
        border: 0;
      }

      .research-section {
        display: block;
      }

      .research-section h3 {
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <p class="brand"><span>Blue Tick Warrior</span> / Threat Intelligence</p>
      <p class="header-description">
        Security reporting with on-demand technical research and source validation.
      </p>
    </div>
  </header>

  <main id="main">
    <aside id="vulnerability-index">
      <h2 class="index-title">Vulnerabilities</h2>
      <div id="vulnerability-list"></div>
    </aside>

    <section id="feed-column">
      <p id="status">Loading feed…</p>
      <div id="feed"></div>
    </section>

    <aside id="research-panel">
      <div class="panel-header">
        <button id="close-panel" type="button" aria-label="Close research panel">×</button>
        <h2 id="research-title">Research results</h2>
      </div>

      <div id="research-result"></div>
    </aside>
  </main>

  <script>
    const FEED_URL =
      "https://d2c8564e9x1krw.cloudfront.net/feed/feed.json?v=2";

    const RESEARCH_URL =
      "https://eabcv2ra8b.execute-api.ap-southeast-1.amazonaws.com/research";

    const main = document.querySelector("#main");
    const feed = document.querySelector("#feed");
    const vulnerabilityList = document.querySelector("#vulnerability-list");
    const status = document.querySelector("#status");
    const panel = document.querySelector("#research-panel");
    const panelTitle = document.querySelector("#research-title");
    const panelResult = document.querySelector("#research-result");
    const views = new Map();

    let openItemId = null;

    function formatDate(value) {
      const date = new Date(value);

      return Number.isNaN(date.getTime())
        ? "Unknown date"
        : date.toLocaleString(undefined, {
            dateStyle: "medium",
            timeStyle: "short"
          });
    }

    function label(value) {
      return String(value || "")
        .replaceAll("_", " ")
        .replace(/\b\w/g, character => character.toUpperCase());
    }

    function displayValue(value) {
      if (value === null || value === undefined || value === "") {
        return "No answer found.";
      }

      if (typeof value === "boolean") {
        return value ? "Yes" : "No";
      }

      if (Array.isArray(value)) {
        return value.length ? value.join(", ") : "None identified.";
      }

      if (typeof value === "object") {
        return JSON.stringify(value, null, 2);
      }

      return String(value);
    }

    function highlightedSourceUrl(url, quote) {
      if (!quote) return url;
      return `${url.split("#")[0]}#:~:text=${encodeURIComponent(quote.trim())}`;
    }

    async function api(itemId, method = "GET") {
      const response = await fetch(
        method === "GET"
          ? `${RESEARCH_URL}?item_id=${encodeURIComponent(itemId)}`
          : RESEARCH_URL,
        method === "GET"
          ? { cache: "no-store" }
          : {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                item_id: itemId
              })
            }
      );

      const data = await response.json();

      if (!response.ok) {
        throw new Error(
          data.message || data.error || `HTTP ${response.status}`
        );
      }

      return data;
    }

    function updateView(itemId, data) {
      const view = views.get(itemId);

      if (!view) {
        return;
      }

      view.status = String(
        data.status || "NOT_REQUESTED"
      ).toUpperCase();

      if (data.result) {
        view.result = data.result;
      }

      if (view.status === "QUEUED") {
        view.button.textContent = "Research queued";
        view.button.disabled = true;
        view.message.textContent = "Waiting to start.";
      } else if (view.status === "PROCESSING") {
        view.button.textContent = "Research in progress";
        view.button.disabled = true;
        view.message.textContent = "Research is running.";
      } else if (view.status === "COMPLETE") {
        view.button.textContent = "Tell me more";
        view.button.disabled = false;
        view.message.textContent = "Research complete.";
      } else if (view.status.startsWith("FAILED")) {
        view.button.textContent = "Try again";
        view.button.disabled = false;
        view.message.textContent =
          data.error || "Research failed.";
      } else {
        view.button.textContent = "Tell me more";
        view.button.disabled = false;
        view.message.textContent = "";
      }
    }

    function addSection(title, value, statusValue, notes, evidence = []) {
      const section = document.createElement("section");
      const heading = document.createElement("h3");
      const content = document.createElement("div");
      const text = document.createElement("p");

      section.className = "research-section";
      content.className = "research-content";

      heading.textContent = title;
      text.textContent = displayValue(value);

      content.append(text);

      if (statusValue) {
        const fieldStatus = document.createElement("p");

        fieldStatus.className = "field-status";
        fieldStatus.textContent = `Status: ${label(statusValue)}`;

        content.append(fieldStatus);
      }

      if (notes) {
        const fieldNotes = document.createElement("p");

        fieldNotes.className = "field-notes";
        fieldNotes.textContent = notes;

        content.append(fieldNotes);
      }

      for (const item of evidence) {
        const evidenceBlock = document.createElement("div");

        evidenceBlock.className = "evidence";

        if (item.quote) {
          const quote = document.createElement("blockquote");

          quote.textContent = item.quote;
          evidenceBlock.append(quote);
        }

        if (item.source_url) {
          const source = document.createElement("a");

          source.href = highlightedSourceUrl(item.source_url, item.quote);
          source.target = "_blank";
          source.rel = "noopener noreferrer";
          source.textContent =
            item.source_title || "Open source";

          evidenceBlock.append(source);
        }

        content.append(evidenceBlock);
      }

      section.append(heading, content);
      panelResult.append(section);
    }

    function renderResult(item, storedResult, updateUrl = true) {
      const result =
        storedResult?.result || storedResult || {};

      const identity = result.identity || {};

      const fields = Array.isArray(result.fields)
        ? result.fields
        : Object.entries(result.fields || {}).map(
            ([name, field]) => ({
              name,
              ...(typeof field === "object" && field !== null
                ? field
                : { value: field })
            })
          );

      panelTitle.textContent =
        item.title || "Research results";

      panelResult.replaceChildren();

      addSection(
        "Article type",
        label(result.article_type || "Unknown")
      );

      addSection(
        "Identity",
        [
          `CVEs: ${displayValue(identity.cve_ids || [])}`,
          `Vendors: ${displayValue(identity.vendors || [])}`,
          `Products: ${displayValue(identity.products || [])}`
        ].join("\n")
      );

      for (const field of fields) {
        addSection(
          label(field.name || "Finding"),
          field.value,
          field.status,
          field.notes,
          field.evidence || []
        );
      }

      if (result.limitations?.length) {
        addSection(
          "Limitations",
          result.limitations.join("\n")
        );
      }

      if (result.conflicts?.length) {
        addSection(
          "Conflicting information",
          result.conflicts
            .map(
              conflict =>
                `${label(conflict.field || "Finding")}: ${
                  conflict.notes ||
                  "Conflicting evidence was found."
                }`
            )
            .join("\n")
        );
      }

      for (const view of views.values()) {
        const active = view.item.id === item.id;
        view.article.classList.toggle("active", active);
        view.indexLink?.classList.toggle("active", active);
      }

      panel.classList.add("open");
      main.classList.add("panel-open");
      openItemId = item.id;

      if (updateUrl) {
        const url = new URL(location.href);
        url.searchParams.set("item_id", item.id);
        history.pushState({ itemId: item.id }, "", url);
      }
    }

    function closePanel(updateUrl = true) {
      panel.classList.remove("open");
      main.classList.remove("panel-open");
      openItemId = null;

      for (const view of views.values()) {
        view.article.classList.remove("active");
        view.indexLink?.classList.remove("active");
      }

      if (updateUrl) {
        const url = new URL(location.href);
        url.searchParams.delete("item_id");
        history.pushState({}, "", url);
      }
    }

    async function openItemFromUrl() {
      const itemId = new URL(location.href).searchParams.get("item_id");

      if (!itemId) {
        closePanel(false);
        return;
      }

      const view = views.get(itemId);

      try {
        const data = await api(itemId);

        if (view) {
          updateView(itemId, data);
        }

        if (String(data.status).toUpperCase() === "COMPLETE" && data.result) {
          renderResult(
            view?.item || { id: itemId, title: "Research results" },
            data.result,
            false
          );
        }
      } catch (error) {
        if (view) {
          view.message.textContent = error.message;
        }
      }
    }

    async function handleResearch(item) {
      const view = views.get(item.id);

      if (view.status === "COMPLETE") {
        if (openItemId === item.id) {
          closePanel();
          return;
        }

        try {
          if (!view.result) {
            updateView(
              item.id,
              await api(item.id)
            );
          }

          renderResult(item, view.result);
        } catch (error) {
          view.message.textContent = error.message;
        }

        return;
      }

      view.button.disabled = true;
      view.button.textContent = "Requesting";

      try {
        updateView(
          item.id,
          await api(item.id, "POST")
        );
      } catch (error) {
        view.button.disabled = false;
        view.button.textContent = "Try again";
        view.message.textContent = error.message;
        view.message.classList.add("error");
      }
    }

    function createFeedItem(item) {
      const article = document.createElement("article");

      article.className = "feed-item";

      article.innerHTML = `
        <h2></h2>
        <div class="metadata"></div>
        <p class="description"></p>
        <div class="actions">
          <a
            class="button secondary"
            target="_blank"
            rel="noopener noreferrer"
          >
            Read original
          </a>

          <button
            class="button"
            type="button"
            disabled
          >
            Checking
          </button>

          <span class="research-status"></span>
        </div>
      `;

      article.querySelector("h2").textContent =
        item.title || "Untitled article";

      article.querySelector(".metadata").textContent =
        `${item.source || "Unknown source"} · ` +
        formatDate(item.published_at);

      article.querySelector(".description").textContent =
        item.description || "No description provided.";

      article.querySelector("a").href =
        item.url || "#";

      const button =
        article.querySelector("button");

      const message =
        article.querySelector(".research-status");

      button.addEventListener(
        "click",
        () => handleResearch(item)
      );

      views.set(item.id, {
        item,
        article,
        button,
        message,
        status: "CHECKING",
        result: null
      });

      return article;
    }

    function createVulnerabilityLink(item) {
      const link = document.createElement("button");
      const view = views.get(item.id);

      link.className = "vulnerability-link";
      link.type = "button";
      link.textContent = item.title || "Untitled article";
      link.addEventListener("click", () => {
        if (view.status === "COMPLETE") {
          handleResearch(item);
        } else {
          view.article.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      });

      view.indexLink = link;
      return link;
    }

    async function refreshStatuses() {
      for (const [itemId, view] of views) {
        if (
          !["CHECKING", "QUEUED", "PROCESSING"]
            .includes(view.status)
        ) {
          continue;
        }

        try {
          updateView(
            itemId,
            await api(itemId)
          );
        } catch (error) {
          view.button.disabled = false;
          view.button.textContent = "Tell me more";
          view.message.textContent = error.message;
        }
      }
    }

    async function loadFeed() {
      try {
        const response = await fetch(
          FEED_URL,
          { cache: "no-store" }
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const items = data.items || [];

        const vulnerabilities = items.filter(
          item => item.article_type === "vulnerability"
        );

        feed.replaceChildren(...items.map(createFeedItem));
        vulnerabilityList.replaceChildren(
          ...vulnerabilities.map(createVulnerabilityLink)
        );

        status.textContent =
          `${items.length} reports · ${vulnerabilities.length} vulnerabilities · Updated ` +
          formatDate(data.updated_at);

        await refreshStatuses();
        await openItemFromUrl();

        setInterval(
          refreshStatuses,
          20000
        );
      } catch (error) {
        status.textContent = "Feed unavailable";
        feed.textContent = error.message;
        vulnerabilityList.replaceChildren();
      }
    }

    document
      .querySelector("#close-panel")
      .addEventListener(
        "click",
        closePanel
      );

    window.addEventListener("popstate", openItemFromUrl);

    loadFeed();
  </script>
</body>
</html>
