<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blue Tick Warrior — Threat Intelligence</title>

  <style>
    :root {
      --paper: #f4f1ea;
      --ink: #171717;
      --muted: #66625b;
      --rule: #b9b3a8;
      --accent: #a52a23;
      --panel: #fffdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      border-bottom: 3px solid var(--ink);
    }

    .masthead {
      width: min(1440px, calc(100% - 40px));
      margin: auto;
      padding: 28px 0 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 5vw, 72px);
      font-weight: 400;
      letter-spacing: -.045em;
      line-height: .95;
    }

    .deck {
      max-width: 620px;
      margin: 14px 0 0;
      color: var(--muted);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      line-height: 1.45;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 860px);
      justify-content: center;
      width: min(1440px, calc(100% - 40px));
      margin: auto;
      padding: 34px 0 70px;
    }

    main.panel-open {
      grid-template-columns: 220px minmax(0, 1fr);
      justify-content: stretch;
      gap: 34px;
    }

    #status {
      margin: 0 0 24px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    #feed {
      border-top: 1px solid var(--ink);
    }

    .feed-item {
      padding: 24px 0 26px;
      border-bottom: 1px solid var(--rule);
    }

    .feed-item h2 {
      max-width: 760px;
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 400;
      letter-spacing: -.02em;
      line-height: 1.08;
    }

    .metadata {
      margin-bottom: 14px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .description {
      max-width: 720px;
      margin: 0;
      color: #3e3b36;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: 18px;
    }

    .button {
      padding: 0 0 3px;
      color: var(--ink);
      background: none;
      border: 0;
      border-bottom: 1px solid currentColor;
      border-radius: 0;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
    }

    .button:hover {
      color: var(--accent);
    }

    .button:disabled {
      color: var(--muted);
      cursor: not-allowed;
    }

    .research-status {
      color: var(--muted);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;
      font-style: italic;
    }

    #research-panel {
      display: none;
      position: sticky;
      top: 20px;
      align-self: start;
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding: 28px 34px 50px;
      background: var(--panel);
      border-top: 5px solid var(--ink);
      border-bottom: 1px solid var(--ink);
    }

    #research-panel.open {
      display: block;
    }

    #close-panel {
      float: right;
      margin: -4px 0 12px 20px;
      padding: 0;
      color: var(--ink);
      background: none;
      border: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      line-height: 1;
      cursor: pointer;
    }

    #research-title {
      max-width: 900px;
      margin: 0 50px 34px 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 4vw, 58px);
      font-weight: 400;
      letter-spacing: -.035em;
      line-height: 1;
    }

    .research-section {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 24px;
      padding: 22px 0;
      border-top: 1px solid var(--rule);
    }

    .research-section h3 {
      margin: 0;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: .1em;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .research-content p {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      line-height: 1.55;
      white-space: pre-line;
    }

    .field-status,
    .field-notes {
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif !important;
      font-size: 12px !important;
    }

    .evidence {
      margin: 18px 0 0;
      padding: 14px 0 0 18px;
      border-left: 2px solid var(--rule);
    }

    .evidence blockquote {
      margin: 0 0 8px;
      color: #393631;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .evidence a {
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    main.panel-open #status,
    main.panel-open .metadata,
    main.panel-open .description,
    main.panel-open .research-status,
    main.panel-open .button.secondary {
      display: none;
    }

    main.panel-open #feed {
      border-top: 3px solid var(--ink);
    }

    main.panel-open .feed-item {
      padding: 14px 0 16px;
    }

    main.panel-open .feed-item h2 {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.35;
    }

    main.panel-open .actions {
      display: block;
      margin-top: 8px;
    }

    main.panel-open .button {
      font-size: 10px;
    }

    @media (max-width: 850px) {
      .masthead,
      main {
        width: calc(100% - 28px);
      }

      main,
      main.panel-open {
        display: block;
      }

      #research-panel.open {
        position: fixed;
        inset: 0;
        z-index: 20;
        max-height: none;
        padding: 24px 20px 50px;
        border: 0;
        border-top: 5px solid var(--ink);
      }

      .research-section {
        display: block;
      }

      .research-section h3 {
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="masthead">
      <p class="eyebrow">Blue Tick Warrior / Intelligence Desk</p>
      <h1>Threat Intelligence</h1>
      <p class="deck">Current security reporting with on-demand technical research.</p>
    </div>
  </header>

  <main id="main">
    <section>
      <p id="status">Loading feed…</p>
      <div id="feed"></div>
    </section>

    <aside id="research-panel">
      <button id="close-panel" type="button" aria-label="Close research panel">×</button>
      <h2 id="research-title">Research results</h2>
      <div id="research-result"></div>
    </aside>
  </main>

  <script>
    const FEED_URL = "https://d2c8564e9x1krw.cloudfront.net/feed/feed.json?v=2";
    const RESEARCH_URL = "https://eabcv2ra8b.execute-api.ap-southeast-1.amazonaws.com/research";

    const main = document.querySelector("#main");
    const feed = document.querySelector("#feed");
    const status = document.querySelector("#status");
    const panel = document.querySelector("#research-panel");
    const panelTitle = document.querySelector("#research-title");
    const panelResult = document.querySelector("#research-result");
    const views = new Map();

    let openItemId = null;

    function formatDate(value) {
      const date = new Date(value);

      return Number.isNaN(date.getTime())
        ? "Unknown date"
        : date.toLocaleString(undefined, {
            dateStyle: "medium",
            timeStyle: "short"
          });
    }

    function label(value) {
      return String(value || "")
        .replaceAll("_", " ")
        .replace(/\b\w/g, character => character.toUpperCase());
    }

    function displayValue(value) {
      if (value === null || value === undefined || value === "") {
        return "No answer found.";
      }

      if (Array.isArray(value)) {
        return value.length ? value.join(", ") : "None identified.";
      }

      if (typeof value === "object") {
        return JSON.stringify(value, null, 2);
      }

      return String(value);
    }

    async function api(itemId, method = "GET") {
      const response = await fetch(
        method === "GET"
          ? `${RESEARCH_URL}?item_id=${encodeURIComponent(itemId)}`
          : RESEARCH_URL,
        method === "GET"
          ? { cache: "no-store" }
          : {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ item_id: itemId })
            }
      );

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || data.error || `HTTP ${response.status}`);
      }

      return data;
    }

    function updateView(itemId, data) {
      const view = views.get(itemId);

      if (!view) {
        return;
      }

      view.status = String(data.status || "NOT_REQUESTED").toUpperCase();

      if (data.result) {
        view.result = data.result;
      }

      if (view.status === "QUEUED") {
        view.button.textContent = "Research queued";
        view.button.disabled = true;
        view.message.textContent = "Waiting to start.";
      } else if (view.status === "PROCESSING") {
        view.button.textContent = "Research in progress";
        view.button.disabled = true;
        view.message.textContent = "Research is running.";
      } else if (view.status === "COMPLETE") {
        view.button.textContent = "Tell me more";
        view.button.disabled = false;
        view.message.textContent = "Research complete.";
      } else if (view.status.startsWith("FAILED")) {
        view.button.textContent = "Try again";
        view.button.disabled = false;
        view.message.textContent = data.error || "Research failed.";
      } else {
        view.button.textContent = "Tell me more";
        view.button.disabled = false;
        view.message.textContent = "";
      }
    }

    function addSection(title, value, statusValue, notes, evidence = []) {
      const section = document.createElement("section");
      const heading = document.createElement("h3");
      const content = document.createElement("div");
      const text = document.createElement("p");

      section.className = "research-section";
      content.className = "research-content";
      heading.textContent = title;
      text.textContent = displayValue(value);

      content.append(text);

      if (statusValue) {
        const fieldStatus = document.createElement("p");
        fieldStatus.className = "field-status";
        fieldStatus.textContent = `Status: ${label(statusValue)}`;
        content.append(fieldStatus);
      }

      if (notes) {
        const fieldNotes = document.createElement("p");
        fieldNotes.className = "field-notes";
        fieldNotes.textContent = notes;
        content.append(fieldNotes);
      }

      for (const item of evidence) {
        const evidenceBlock = document.createElement("div");
        evidenceBlock.className = "evidence";

        if (item.quote) {
          const quote = document.createElement("blockquote");
          quote.textContent = item.quote;
          evidenceBlock.append(quote);
        }

        if (item.source_url) {
          const source = document.createElement("a");
          source.href = item.source_url;
          source.target = "_blank";
          source.rel = "noopener noreferrer";
          source.textContent = item.source_title || "Open source";
          evidenceBlock.append(source);
        }

        content.append(evidenceBlock);
      }

      section.append(heading, content);
      panelResult.append(section);
    }

    function renderResult(item, storedResult) {
      const result = storedResult?.result || storedResult || {};
      const identity = result.identity || {};

      const fields = Array.isArray(result.fields)
        ? result.fields
        : Object.entries(result.fields || {}).map(([name, field]) => ({
            name,
            ...(typeof field === "object" && field !== null
              ? field
              : { value: field })
          }));

      panelTitle.textContent = item.title || "Research results";
      panelResult.replaceChildren();

      addSection("Article type", label(result.article_type || "Unknown"));

      addSection(
        "Identity",
        [
          `CVEs: ${displayValue(identity.cve_ids || [])}`,
          `Vendors: ${displayValue(identity.vendors || [])}`,
          `Products: ${displayValue(identity.products || [])}`
        ].join("\n")
      );

      for (const field of fields) {
        addSection(
          label(field.name || "Finding"),
          field.value,
          field.status,
          field.notes,
          field.evidence || []
        );
      }

      if (result.limitations?.length) {
        addSection("Limitations", result.limitations.join("\n"));
      }

      if (result.conflicts?.length) {
        addSection(
          "Conflicting information",
          result.conflicts
            .map(conflict =>
              `${label(conflict.field || "Finding")}: ${
                conflict.notes || "Conflicting evidence was found."
              }`
            )
            .join("\n")
        );
      }

      panel.classList.add("open");
      main.classList.add("panel-open");
      openItemId = item.id;
    }

    function closePanel() {
      panel.classList.remove("open");
      main.classList.remove("panel-open");
      openItemId = null;
    }

    async function handleResearch(item) {
      const view = views.get(item.id);

      if (view.status === "COMPLETE") {
        if (openItemId === item.id) {
          closePanel();
          return;
        }

        try {
          if (!view.result) {
            updateView(item.id, await api(item.id));
          }

          renderResult(item, view.result);
        } catch (error) {
          view.message.textContent = error.message;
        }

        return;
      }

      view.button.disabled = true;
      view.button.textContent = "Requesting";

      try {
        updateView(item.id, await api(item.id, "POST"));
      } catch (error) {
        view.button.disabled = false;
        view.button.textContent = "Try again";
        view.message.textContent = error.message;
      }
    }

    function createFeedItem(item) {
      const article = document.createElement("article");

      article.className = "feed-item";
      article.innerHTML = `
        <h2></h2>
        <div class="metadata"></div>
        <p class="description"></p>
        <div class="actions">
          <a class="button secondary" target="_blank" rel="noopener noreferrer">Read original</a>
          <button class="button" type="button" disabled>Checking</button>
          <span class="research-status"></span>
        </div>
      `;

      article.querySelector("h2").textContent = item.title || "Untitled article";
      article.querySelector(".metadata").textContent =
        `${item.source || "Unknown source"} / ${formatDate(item.published_at)}`;
      article.querySelector(".description").textContent =
        item.description || "No description provided.";
      article.querySelector("a").href = item.url || "#";

      const button = article.querySelector("button");
      const message = article.querySelector(".research-status");

      button.addEventListener("click", () => handleResearch(item));

      views.set(item.id, {
        item,
        button,
        message,
        status: "CHECKING",
        result: null
      });

      return article;
    }

    async function refreshStatuses() {
      for (const [itemId, view] of views) {
        if (!["CHECKING", "QUEUED", "PROCESSING"].includes(view.status)) {
          continue;
        }

        try {
          updateView(itemId, await api(itemId));
        } catch (error) {
          view.button.disabled = false;
          view.button.textContent = "Tell me more";
          view.message.textContent = error.message;
        }
      }
    }

    async function loadFeed() {
      try {
        const response = await fetch(FEED_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const items = data.items || [];

        feed.replaceChildren(...items.map(createFeedItem));
        status.textContent =
          `${items.length} reports / updated ${formatDate(data.updated_at)}`;

        await refreshStatuses();
        setInterval(refreshStatuses, 20000);
      } catch (error) {
        status.textContent = "Feed unavailable";
        feed.textContent = error.message;
      }
    }

    document
      .querySelector("#close-panel")
      .addEventListener("click", closePanel);

    loadFeed();
  </script>
</body>
</html>
