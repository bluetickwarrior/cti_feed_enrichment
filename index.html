<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blue Tick Warrior — Threat Intelligence</title>

  <style>
    :root {
      color-scheme: dark;
      --background: #0a0d11;
      --surface: #10151b;
      --surface-raised: #151b23;
      --text: #eef2f7;
      --muted: #8d98a8;
      --line: #27303b;
      --accent: #5aa7ff;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--background);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    a {
      font: inherit;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(10, 13, 17, 0.96);
    }

    .header-inner {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      width: min(1440px, calc(100% - 40px));
      margin: auto;
      padding: 22px 0;
    }

    .brand {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .brand span {
      color: var(--accent);
    }

    .header-description {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: right;
    }

    main {
      display: grid;
      grid-template-columns: 220px minmax(0, 900px);
      justify-content: center;
      gap: 32px;
      width: min(1440px, calc(100% - 40px));
      margin: auto;
      padding: 32px 0 70px;
    }

    main.panel-open {
      grid-template-columns: 180px 210px minmax(0, 1fr);
      justify-content: stretch;
      gap: 20px;
    }

    #status {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
    }

    #vulnerability-index {
      position: sticky;
      top: 20px;
      align-self: start;
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding-right: 4px;
    }

    .index-title {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    #latest-vulnerability-list,
    #recent-vulnerability-list {
      display: grid;
      border-top: 1px solid var(--line);
    }

    .vulnerability-group + .vulnerability-group {
      margin-top: 28px;
    }

    .vulnerability-link {
      padding: 11px 0;
      color: var(--muted);
      background: none;
      border: 0;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      text-align: left;
      cursor: pointer;
    }

    .vulnerability-link:hover,
    .vulnerability-link.active {
      color: #8fc5ff;
    }

    .vulnerability-link.active {
      padding-left: 9px;
      background: rgba(90, 167, 255, .12);
      border-left: 3px solid var(--accent);
    }

    #feed {
      border-top: 1px solid var(--line);
    }

    .feed-item {
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }

    .feed-item h2 {
      max-width: 800px;
      margin: 0 0 8px;
      font-size: clamp(20px, 2.5vw, 30px);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.15;
    }

    .metadata {
      margin-bottom: 13px;
      color: var(--muted);
      font-size: 12px;
    }

    .description {
      max-width: 760px;
      margin: 0;
      color: #c5ccd6;
      font-size: 15px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 13px;
      color: var(--background);
      background: var(--text);
      border: 1px solid var(--text);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .button:hover {
      color: var(--background);
      background: var(--accent);
      border-color: var(--accent);
    }

    .button.secondary {
      color: var(--text);
      background: transparent;
      border-color: var(--line);
    }

    .button.secondary:hover {
      color: var(--text);
      background: var(--surface-raised);
      border-color: #3a4654;
    }

    .button:disabled {
      color: var(--muted);
      background: var(--surface);
      border-color: var(--line);
      cursor: not-allowed;
    }

    .research-status {
      color: var(--muted);
      font-size: 12px;
    }

    #research-panel {
      display: none;
      position: sticky;
      top: 20px;
      align-self: start;
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
    }

    #research-panel.open {
      display: block;
    }

    .panel-header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 24px 28px 22px;
      background: rgba(16, 21, 27, 0.97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    #research-title {
      max-width: 1000px;
      margin: 0;
      padding-right: 50px;
      font-size: clamp(26px, 3vw, 44px);
      font-weight: 600;
      letter-spacing: -0.035em;
      line-height: 1.08;
    }

    #close-panel {
      position: absolute;
      top: 20px;
      right: 24px;
      width: 32px;
      height: 32px;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    #close-panel:hover {
      color: var(--text);
      border-color: #485464;
    }

    #research-result {
      padding: 0 28px 42px;
    }

    .research-section {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 28px;
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }

    .research-section h3 {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .research-content p {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .research-content p:last-child {
      margin-bottom: 0;
    }

    .field-status,
    .field-notes {
      color: var(--muted) !important;
      font-size: 12px !important;
    }

    .evidence {
      margin-top: 18px;
      padding: 14px 16px;
      background: var(--surface-raised);
      border-left: 2px solid var(--accent);
    }

    .evidence blockquote {
      margin: 0 0 10px;
      color: #d6dce5;
      font-size: 14px;
      line-height: 1.55;
    }

    .evidence a {
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .evidence a:hover {
      text-decoration: underline;
    }

    main.panel-open #status,
    main.panel-open .metadata,
    main.panel-open .description,
    main.panel-open .research-status,
    main.panel-open .button.secondary {
      display: none;
    }

    main.panel-open #feed {
      border-top-color: #394451;
    }

    main.panel-open .feed-item {
      padding: 14px 0;
    }

    main.panel-open .feed-item h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.4;
    }

    main.panel-open .feed-item.active {
      margin: 0 -10px;
      padding: 14px 10px;
      background: rgba(90, 167, 255, 0.12);
      border-left: 3px solid var(--accent);
    }

    main.panel-open .feed-item.active h2 {
      color: #8fc5ff;
    }

    main.panel-open .actions {
      display: block;
      margin-top: 9px;
    }

    main.panel-open .button {
      width: 100%;
      min-height: 30px;
      padding: 0 8px;
      font-size: 10px;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 850px) {
      .header-inner {
        display: block;
        width: calc(100% - 28px);
      }

      .header-description {
        margin-top: 8px;
        text-align: left;
      }

      main,
      main.panel-open {
        display: block;
        width: calc(100% - 28px);
      }

      #vulnerability-index {
        position: static;
        max-height: none;
        margin-bottom: 28px;
      }

      #research-panel.open {
        position: fixed;
        inset: 0;
        z-index: 20;
        max-height: none;
        border: 0;
      }

      .research-section {
        display: block;
      }

      .research-section h3 {
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <p class="brand"><span>Blue Tick Warrior</span> / Threat Intelligence</p>
      <p class="header-description">
        Security reporting with on-demand technical research and source validation.
      </p>
    </div>
  </header>

  <main id="main">
    <aside id="vulnerability-index">
      <section class="vulnerability-group">
        <h2 class="index-title">Latest Vulnerabilities</h2>
        <div id="latest-vulnerability-list"></div>
      </section>

      <section class="vulnerability-group">
        <h2 class="index-title">Recent Vulnerabilities</h2>
        <div id="recent-vulnerability-list"></div>
      </section>
    </aside>

    <section id="feed-column">
      <p id="status">Loading feed…</p>
      <div id="feed"></div>
    </section>


  </main>

  <script>
    const FEED_URL =
      "https://d2c8564e9x1krw.cloudfront.net/feed/feed.json?v=2";

    const main = document.querySelector("#main");
    const feed = document.querySelector("#feed");
    const latestVulnerabilityList = document.querySelector("#latest-vulnerability-list");
    const recentVulnerabilityList = document.querySelector("#recent-vulnerability-list");
    const status = document.querySelector("#status");

    function formatDate(value) {
      const date = new Date(value);

      return Number.isNaN(date.getTime())
        ? "Unknown date"
        : date.toLocaleString(undefined, {
            dateStyle: "medium",
            timeStyle: "short"
          });
    }

    function createFeedItem(item) {
      const article = document.createElement("article");

      article.className = "feed-item";
      article.id = `item-${item.id}`;

      article.innerHTML = `
        <h2></h2>
        <div class="metadata"></div>
        <p class="description"></p>
        <div class="actions">
          <a
            class="button secondary"
            target="_blank"
            rel="noopener noreferrer"
          >
            Read original
          </a>
        </div>
      `;

      article.querySelector("h2").textContent =
        item.title || "Untitled article";

      article.querySelector(".metadata").textContent =
        `${item.source || "Unknown source"} · ` +
        formatDate(item.published_at);

      article.querySelector(".description").textContent =
        item.description || "No description provided.";

      article.querySelector("a").href =
        item.url || "#";

      return article;
    }

    function createVulnerabilityLink(item) {
      const link = document.createElement("button");

      link.className = "vulnerability-link";
      link.type = "button";
      link.textContent = item.title || "Untitled article";
      link.addEventListener("click", () => {
        const target = document.getElementById(`item-${item.id}`);
        target?.scrollIntoView({ behavior: "smooth", block: "center" });
      });

      return link;
    }

    async function loadFeed() {
      try {
        const response = await fetch(
          FEED_URL,
          { cache: "no-store" }
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const items = data.items || [];

        const latestVulnerabilities = items.filter(
          item => item.article_type === "vulnerability"
        );

        const recentVulnerabilities = (
          data.recent_vulnerabilities || []
        )
          .filter(item => item.article_type === "vulnerability")
          .slice(0, 10);

        const displayedItems = [
          ...items,
          ...recentVulnerabilities.filter(
            recent => !items.some(item => item.id === recent.id)
          )
        ];

        feed.replaceChildren(...displayedItems.map(createFeedItem));
        latestVulnerabilityList.replaceChildren(
          ...latestVulnerabilities.map(createVulnerabilityLink)
        );
        recentVulnerabilityList.replaceChildren(
          ...recentVulnerabilities.map(createVulnerabilityLink)
        );

        status.textContent =
          `${items.length} reports · ${latestVulnerabilities.length} latest vulnerabilities · ` +
          `${recentVulnerabilities.length} recent vulnerabilities · Updated ` +
          formatDate(data.updated_at);
      } catch (error) {
        status.textContent = "Feed unavailable";
        feed.textContent = error.message;
        latestVulnerabilityList.replaceChildren();
        recentVulnerabilityList.replaceChildren();
      }
    }

    loadFeed();
  </script>
</body>
</html>
