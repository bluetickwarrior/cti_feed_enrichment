<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Threat Intelligence Feed</title>

  <style>
    :root {
      font-family:
        Inter, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    header {
      padding: 2rem 1rem;
      color: white;
      background: #111827;
    }

    header div,
    main {
      width: min(900px, calc(100% - 2rem));
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.5rem;
    }

    header p {
      margin: 0;
      color: #d1d5db;
    }

    main {
      padding: 2rem 0;
    }

    #status {
      margin-bottom: 1rem;
      color: #4b5563;
    }

    #feed {
      display: grid;
      gap: 1rem;
    }

    .feed-item {
      padding: 1.25rem;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 0.75rem;
    }

    .feed-item h2 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }

    .metadata {
      margin-bottom: 1rem;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .button {
      display: inline-block;
      padding: 0.65rem 1rem;
      color: white;
      text-decoration: none;
      background: #1f2937;
      border: 0;
      border-radius: 0.5rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .button.secondary {
      color: #1f2937;
      background: #e5e7eb;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .error {
      padding: 1rem;
      color: #991b1b;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 0.5rem;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Threat Intelligence Feed</h1>
      <p>Security news with on-demand research enrichment.</p>
    </div>
  </header>

  <main>
    <p id="status">Loading feed…</p>
    <section id="feed" aria-live="polite"></section>
  </main>

  <script>
  const FEED_URL =
    "https://d2c8564e9x1krw.cloudfront.net/feed/feed.json?v=2";

  const feedElement = document.querySelector("#feed");
  const statusElement = document.querySelector("#status");

  function formatDate(value) {
    const date = new Date(value);

    if (Number.isNaN(date.getTime())) {
      return "Unknown publication date";
    }

    return new Intl.DateTimeFormat(undefined, {
      dateStyle: "medium",
      timeStyle: "short"
    }).format(date);
  }

  function createFeedItem(item) {
    const article = document.createElement("article");
    article.className = "feed-item";

    const title = document.createElement("h2");
    title.textContent = item.title || "Untitled article";

    const metadata = document.createElement("div");
    metadata.className = "metadata";
    metadata.textContent =
      `${item.source || "Unknown source"} · ` +
      formatDate(item.published_at);

    const description = document.createElement("p");
    description.textContent =
      item.description || "No description was provided.";

    const actions = document.createElement("div");
    actions.className = "actions";

    const originalLink = document.createElement("a");
    originalLink.className = "button secondary";
    originalLink.textContent = "Read original";
    originalLink.href = item.url;
    originalLink.target = "_blank";
    originalLink.rel = "noopener noreferrer";

    const researchButton = document.createElement("button");
    researchButton.className = "button";
    researchButton.type = "button";
    researchButton.textContent = "Tell me more";
    researchButton.disabled = true;

    actions.append(originalLink, researchButton);
    article.append(title, metadata, description, actions);

    return article;
  }

  async function loadFeed() {
    statusElement.textContent = "Requesting feed…";

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);

    try {
      const response = await fetch(FEED_URL, {
        cache: "no-store",
        signal: controller.signal
      });

      if (!response.ok) {
        throw new Error(
          `CloudFront returned HTTP ${response.status}`
        );
      }

      const data = await response.json();

      if (!Array.isArray(data.items)) {
        throw new Error(
          "The returned JSON does not contain an items array."
        );
      }

      feedElement.replaceChildren(
        ...data.items.map(createFeedItem)
      );

      statusElement.textContent =
        `${data.items.length} item(s) loaded. ` +
        `Feed updated ${formatDate(data.updated_at)}.`;
    } catch (error) {
      console.error("Feed loading failed:", error);

      statusElement.textContent = "Feed unavailable.";

      const message = document.createElement("div");
      message.className = "error";
      message.textContent =
        `The feed could not be loaded: ${error.message}`;

      feedElement.replaceChildren(message);
    } finally {
      clearTimeout(timeoutId);
    }
  }

  loadFeed();
</script>
</body>
</html>
