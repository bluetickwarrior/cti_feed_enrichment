<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Threat Intelligence Feed</title>

  <style>
    :root {
      font-family: Inter, system-ui, sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    header {
      padding: 2rem 1rem;
      color: white;
      background: #111827;
    }

    header div,
    main {
      width: min(1300px, calc(100% - 2rem));
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.5rem;
    }

    header p {
      margin: 0;
      color: #d1d5db;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
      gap: 1rem;
      padding: 2rem 0;
    }

    #status {
      margin-top: 0;
      color: #4b5563;
    }

    #feed {
      display: grid;
      gap: 1rem;
    }

    .feed-item,
    #research-panel {
      padding: 1.25rem;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 0.75rem;
    }

    .feed-item h2 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }

    .metadata,
    .research-status {
      color: #6b7280;
      font-size: 0.9rem;
    }

    .actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .button {
      padding: 0.65rem 1rem;
      color: white;
      background: #1f2937;
      border: 0;
      border-radius: 0.5rem;
      font: inherit;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .button.secondary {
      color: #1f2937;
      background: #e5e7eb;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    #research-panel {
      display: none;
      position: sticky;
      top: 1rem;
      align-self: start;
      max-height: calc(100vh - 2rem);
      overflow: auto;
    }

    #research-panel.open {
      display: block;
    }

    #close-panel {
      float: right;
      border: 0;
      background: none;
      font-size: 1.5rem;
      cursor: pointer;
    }

    #research-result {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .error {
      color: #991b1b;
    }

    @media (max-width: 900px) {
      main {
        display: block;
      }

      #research-panel {
        position: fixed;
        inset: 0;
        z-index: 10;
        max-height: none;
        border-radius: 0;
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Threat Intelligence Feed</h1>
      <p>Security news with on-demand research enrichment.</p>
    </div>
  </header>

  <main>
    <div>
      <p id="status">Loading feed…</p>
      <section id="feed"></section>
    </div>

    <aside id="research-panel">
      <button id="close-panel" type="button">×</button>
      <h2 id="research-title">Research results</h2>
      <pre id="research-result"></pre>
    </aside>
  </main>

  <script>
    const FEED_URL =
      "https://d2c8564e9x1krw.cloudfront.net/feed/feed.json?v=2";

    const RESEARCH_URL =
      "https://eabcv2ra8b.execute-api.ap-southeast-1.amazonaws.com/research";

    const feedElement = document.querySelector("#feed");
    const statusElement = document.querySelector("#status");
    const panelElement = document.querySelector("#research-panel");
    const panelTitle = document.querySelector("#research-title");
    const panelResult = document.querySelector("#research-result");
    const items = new Map();

    function formatDate(value) {
      const date = new Date(value);

      return Number.isNaN(date.getTime())
        ? "Unknown publication date"
        : new Intl.DateTimeFormat(undefined, {
            dateStyle: "medium",
            timeStyle: "short"
          }).format(date);
    }

    async function request(url, options) {
      const response = await fetch(url, options);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || data.error || `HTTP ${response.status}`);
      }

      return data;
    }

    async function getResearch(itemId) {
      return request(
        `${RESEARCH_URL}?item_id=${encodeURIComponent(itemId)}`,
        { cache: "no-store" }
      );
    }

    async function queueResearch(itemId) {
      return request(RESEARCH_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          item_id: itemId
        })
      });
    }

    function updateItem(itemId, data) {
      const view = items.get(itemId);

      if (!view) {
        return;
      }

      view.status = String(data.status || "NOT_REQUESTED").toUpperCase();

      if (data.result) {
        view.result = data.result;
      }

      if (view.status === "QUEUED") {
        view.button.textContent = "Research queued";
        view.button.disabled = true;
        view.message.textContent = "Waiting to start.";
      } else if (view.status === "PROCESSING") {
        view.button.textContent = "Research in progress";
        view.button.disabled = true;
        view.message.textContent = "Research is running.";
      } else if (view.status === "COMPLETE") {
        view.button.textContent = "Tell me more";
        view.button.disabled = false;
        view.message.textContent = "Research complete.";
      } else if (view.status.startsWith("FAILED")) {
        view.button.textContent = "Try again";
        view.button.disabled = false;
        view.message.textContent = data.error || "Research failed.";
      } else {
        view.button.textContent = "Tell me more";
        view.button.disabled = false;
        view.message.textContent = "";
      }
    }

    function showResult(item, result) {
      panelTitle.textContent = item.title;
      panelResult.textContent = JSON.stringify(result, null, 2);
      panelElement.classList.add("open");
    }

    async function handleResearch(item) {
      const view = items.get(item.id);

      if (view.status === "COMPLETE") {
        if (!view.result) {
          updateItem(item.id, await getResearch(item.id));
        }

        showResult(item, view.result);
        return;
      }

      view.button.disabled = true;
      view.button.textContent = "Requesting…";

      try {
        updateItem(item.id, await queueResearch(item.id));
      } catch (error) {
        view.button.disabled = false;
        view.button.textContent = "Try again";
        view.message.textContent = error.message;
        view.message.className = "research-status error";
      }
    }

    function createFeedItem(item) {
      const article = document.createElement("article");
      article.className = "feed-item";

      article.innerHTML = `
        <h2></h2>
        <div class="metadata"></div>
        <p class="description"></p>
        <div class="actions">
          <a class="button secondary" target="_blank" rel="noopener noreferrer">
            Read original
          </a>
          <button class="button" type="button" disabled>
            Checking…
          </button>
          <span class="research-status"></span>
        </div>
      `;

      article.querySelector("h2").textContent =
        item.title || "Untitled article";

      article.querySelector(".metadata").textContent =
        `${item.source || "Unknown source"} · ${formatDate(item.published_at)}`;

      article.querySelector(".description").textContent =
        item.description || "No description was provided.";

      article.querySelector("a").href = item.url;

      const button = article.querySelector("button");
      const message = article.querySelector(".research-status");

      button.addEventListener("click", () => handleResearch(item));

      items.set(item.id, {
        item,
        button,
        message,
        status: "CHECKING",
        result: null
      });

      return article;
    }

    async function refreshStatuses() {
      await Promise.allSettled(
        [...items.keys()].map(async itemId => {
          try {
            updateItem(itemId, await getResearch(itemId));
          } catch (error) {
            const view = items.get(itemId);
            view.button.disabled = false;
            view.button.textContent = "Tell me more";
            view.message.textContent = error.message;
          }
        })
      );
    }

    async function loadFeed() {
      try {
        const response = await fetch(FEED_URL, {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        feedElement.replaceChildren(
          ...data.items.map(createFeedItem)
        );

        statusElement.textContent =
          `${data.items.length} item(s) loaded. ` +
          `Feed updated ${formatDate(data.updated_at)}.`;

        await refreshStatuses();
        setInterval(refreshStatuses, 5000);
      } catch (error) {
        statusElement.textContent = "Feed unavailable.";
        feedElement.textContent = error.message;
      }
    }

    document.querySelector("#close-panel").addEventListener("click", () => {
      panelElement.classList.remove("open");
    });

    loadFeed();
  </script>
</body>
</html>
