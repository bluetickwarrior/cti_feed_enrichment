<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Threat Intelligence Feed</title>

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,sans-serif;color:#1f2937;background:#f3f4f6}
    header{padding:2rem 1rem;color:#fff;background:#111827}
    header div,main{width:min(1400px,calc(100% - 2rem));margin:auto}
    h1{margin:0 0 .5rem}
    header p{margin:0;color:#d1d5db}

    main{
      display:grid;
      grid-template-columns:minmax(0,900px);
      justify-content:center;
      gap:1rem;
      padding:2rem 0;
    }

    main.panel-open{
      grid-template-columns:190px minmax(0,1fr);
      justify-content:stretch;
    }

    #feed{display:grid;gap:1rem}
    #status{margin-top:0;color:#4b5563}

    .feed-item,#research-panel{
      padding:1.25rem;
      background:#fff;
      border:1px solid #d1d5db;
      border-radius:.75rem;
    }

    .feed-item h2{margin:0 0 .5rem;font-size:1.2rem}
    .metadata,.research-status{font-size:.9rem;color:#6b7280}

    .actions{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:.75rem;
      margin-top:1rem;
    }

    .button{
      padding:.65rem 1rem;
      border:0;
      border-radius:.5rem;
      color:#fff;
      background:#1f2937;
      font:inherit;
      font-weight:600;
      text-align:center;
      text-decoration:none;
      cursor:pointer;
    }

    .button.secondary{color:#1f2937;background:#e5e7eb}
    .button:disabled{opacity:.55;cursor:not-allowed}

    #research-panel{
      display:none;
      position:sticky;
      top:1rem;
      align-self:start;
      width:100%;
      max-height:calc(100vh - 2rem);
      overflow:auto;
    }

    #research-panel.open{display:block}

    #close-panel{
      float:right;
      padding:0;
      border:0;
      background:none;
      font-size:1.75rem;
      cursor:pointer;
    }

    #research-title{margin-top:0;padding-right:2rem}

    .research-field{
      margin:1rem 0;
      padding:1rem;
      background:#f9fafb;
      border:1px solid #e5e7eb;
      border-radius:.5rem;
    }

    .research-field h3{margin:0 0 .5rem}
    .research-field p{margin:.4rem 0;line-height:1.5}
    .research-field blockquote{
      margin:.75rem 0;
      padding-left:.75rem;
      color:#4b5563;
      border-left:3px solid #d1d5db;
    }

    .research-field a{color:#1d4ed8;overflow-wrap:anywhere}

    main.panel-open #status,
    main.panel-open .description,
    main.panel-open .metadata,
    main.panel-open .research-status,
    main.panel-open .button.secondary{
      display:none;
    }

    main.panel-open .feed-item{padding:.75rem}
    main.panel-open .feed-item h2{
      margin:0;
      font-size:.85rem;
      line-height:1.3;
    }

    main.panel-open .actions{
      display:block;
      margin-top:.65rem;
    }

    main.panel-open .actions .button{
      width:100%;
      padding:.5rem;
      font-size:.75rem;
    }

    @media(max-width:800px){
      main,main.panel-open{display:block}
      #research-panel.open{
        position:fixed;
        inset:0;
        z-index:10;
        max-height:none;
        border:0;
        border-radius:0;
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Threat Intelligence Feed</h1>
      <p>Security news with on-demand research enrichment.</p>
    </div>
  </header>

  <main id="main">
    <div>
      <p id="status">Loading feed…</p>
      <section id="feed"></section>
    </div>

    <aside id="research-panel">
      <button id="close-panel" type="button" aria-label="Close">×</button>
      <h2 id="research-title">Research results</h2>
      <div id="research-result"></div>
    </aside>
  </main>

  <script>
    const FEED_URL="https://d2c8564e9x1krw.cloudfront.net/feed/feed.json?v=2";
    const RESEARCH_URL="https://eabcv2ra8b.execute-api.ap-southeast-1.amazonaws.com/research";

    const main=document.querySelector("#main");
    const feed=document.querySelector("#feed");
    const status=document.querySelector("#status");
    const panel=document.querySelector("#research-panel");
    const panelTitle=document.querySelector("#research-title");
    const panelResult=document.querySelector("#research-result");
    const views=new Map();

    let openItemId=null;

    function formatDate(value){
      const date=new Date(value);
      return Number.isNaN(date.getTime())
        ?"Unknown publication date"
        :date.toLocaleString();
    }

    function label(value){
      return String(value).replaceAll("_"," ").replace(/\b\w/g,c=>c.toUpperCase());
    }

    async function api(itemId,method="GET"){
      const response=await fetch(
        method==="GET"
          ?`${RESEARCH_URL}?item_id=${encodeURIComponent(itemId)}`
          :RESEARCH_URL,
        method==="GET"
          ?{cache:"no-store"}
          :{
              method:"POST",
              headers:{"Content-Type":"application/json"},
              body:JSON.stringify({item_id:itemId})
            }
      );

      const data=await response.json();

      if(!response.ok){
        throw new Error(data.message||data.error||`HTTP ${response.status}`);
      }

      return data;
    }

    function updateView(itemId,data){
      const view=views.get(itemId);
      if(!view)return;

      view.status=String(data.status||"NOT_REQUESTED").toUpperCase();

      if(data.result){
        view.result=data.result;
      }

      if(view.status==="QUEUED"){
        view.button.textContent="Research queued";
        view.button.disabled=true;
        view.message.textContent="Waiting to start.";
      }else if(view.status==="PROCESSING"){
        view.button.textContent="Research in progress";
        view.button.disabled=true;
        view.message.textContent="Research is running.";
      }else if(view.status==="COMPLETE"){
        view.button.textContent="Tell me more";
        view.button.disabled=false;
        view.message.textContent="Research complete.";
      }else if(view.status.startsWith("FAILED")){
        view.button.textContent="Try again";
        view.button.disabled=false;
        view.message.textContent=data.error||"Research failed.";
      }else{
        view.button.textContent="Tell me more";
        view.button.disabled=false;
        view.message.textContent="";
      }
    }

    function addSection(title,value){
      const section=document.createElement("section");
      section.className="research-field";

      const heading=document.createElement("h3");
      heading.textContent=title;

      const text=document.createElement("p");
      text.textContent=value||"Not provided.";

      section.append(heading,text);
      panelResult.append(section);
    }

    function renderResult(item,storedResult){
      const result=storedResult?.result||storedResult||{};
      const identity=result.identity||{};
      const fields=Array.isArray(result.fields)
        ?result.fields
        :Object.entries(result.fields||{}).map(([name,value])=>({
            name,
            ...(typeof value==="object"&&value!==null?value:{value})
          }));

      panelTitle.textContent=item.title||"Research results";
      panelResult.replaceChildren();

      addSection("Article type",label(result.article_type||"Unknown"));

      addSection(
        "Identity",
        [
          `CVEs: ${(identity.cve_ids||[]).join(", ")||"None identified"}`,
          `Vendors: ${(identity.vendors||[]).join(", ")||"None identified"}`,
          `Products: ${(identity.products||[]).join(", ")||"None identified"}`
        ].join("\n")
      );

      for(const field of fields){
        const section=document.createElement("section");
        section.className="research-field";

        const heading=document.createElement("h3");
        heading.textContent=label(field.name||"Field");

        const value=document.createElement("p");
        value.textContent=field.value??"No answer found.";

        section.append(heading,value);

        if(field.status){
          const fieldStatus=document.createElement("p");
          fieldStatus.textContent=`Status: ${label(field.status)}`;
          section.append(fieldStatus);
        }

        if(field.notes){
          const notes=document.createElement("p");
          notes.textContent=`Notes: ${field.notes}`;
          section.append(notes);
        }

        for(const evidence of field.evidence||[]){
          if(evidence.quote){
            const quote=document.createElement("blockquote");
            quote.textContent=evidence.quote;
            section.append(quote);
          }

          if(evidence.source_url){
            const source=document.createElement("a");
            source.href=evidence.source_url;
            source.target="_blank";
            source.rel="noopener noreferrer";
            source.textContent=evidence.source_title||"View source";
            section.append(source);
          }
        }

        panelResult.append(section);
      }

      if(result.limitations?.length){
        addSection("Limitations",result.limitations.join("\n"));
      }

      if(result.conflicts?.length){
        addSection(
          "Conflicts",
          result.conflicts
            .map(conflict=>`${label(conflict.field||"Field")}: ${conflict.notes||"Conflicting information found."}`)
            .join("\n")
        );
      }

      panel.classList.add("open");
      main.classList.add("panel-open");
      openItemId=item.id;
    }

    function closePanel(){
      panel.classList.remove("open");
      main.classList.remove("panel-open");
      openItemId=null;
    }

    async function handleResearch(item){
      const view=views.get(item.id);

      if(view.status==="COMPLETE"){
        if(openItemId===item.id){
          closePanel();
          return;
        }

        if(!view.result){
          updateView(item.id,await api(item.id));
        }

        renderResult(item,view.result);
        return;
      }

      view.button.disabled=true;
      view.button.textContent="Requesting…";

      try{
        updateView(item.id,await api(item.id,"POST"));
      }catch(error){
        view.button.disabled=false;
        view.button.textContent="Try again";
        view.message.textContent=error.message;
      }
    }

    function createFeedItem(item){
      const article=document.createElement("article");
      article.className="feed-item";

      article.innerHTML=`
        <h2></h2>
        <div class="metadata"></div>
        <p class="description"></p>
        <div class="actions">
          <a class="button secondary" target="_blank" rel="noopener noreferrer">Read original</a>
          <button class="button" type="button" disabled>Checking…</button>
          <span class="research-status"></span>
        </div>
      `;

      article.querySelector("h2").textContent=item.title||"Untitled article";
      article.querySelector(".metadata").textContent=
        `${item.source||"Unknown source"} · ${formatDate(item.published_at)}`;
      article.querySelector(".description").textContent=
        item.description||"No description provided.";
      article.querySelector("a").href=item.url||"#";

      const button=article.querySelector("button");
      const message=article.querySelector(".research-status");

      button.addEventListener("click",()=>handleResearch(item));

      views.set(item.id,{
        item,
        button,
        message,
        status:"CHECKING",
        result:null
      });

      return article;
    }

    async function refreshStatuses(){
      for(const [itemId,view] of views){
        if(!["CHECKING","QUEUED","PROCESSING"].includes(view.status)){
          continue;
        }

        try{
          updateView(itemId,await api(itemId));
        }catch(error){
          view.button.disabled=false;
          view.button.textContent="Tell me more";
          view.message.textContent=error.message;
        }
      }
    }

    async function loadFeed(){
      try{
        const response=await fetch(FEED_URL,{cache:"no-store"});

        if(!response.ok){
          throw new Error(`HTTP ${response.status}`);
        }

        const data=await response.json();
        const items=data.items||[];

        feed.replaceChildren(...items.map(createFeedItem));
        status.textContent=`${items.length} item(s) loaded. Feed updated ${formatDate(data.updated_at)}.`;

        await refreshStatuses();
        setInterval(refreshStatuses,20000);
      }catch(error){
        status.textContent="Feed unavailable.";
        feed.textContent=error.message;
      }
    }

    document.querySelector("#close-panel").addEventListener("click",closePanel);
    loadFeed();
  </script>
</body>
</html>
