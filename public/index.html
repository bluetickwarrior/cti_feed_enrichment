<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Threat Intelligence Feed</title>

  <style>
    :root {
      font-family:
        Inter, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    header {
      background: #111827;
      color: #ffffff;
      padding: 2rem 1rem;
    }

    header div,
    main {
      width: min(900px, calc(100% - 2rem));
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.5rem;
    }

    header p {
      margin: 0;
      color: #d1d5db;
    }

    main {
      padding: 2rem 0;
    }

    .status {
      padding: 1.5rem;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 0.75rem;
    }

    .status h2 {
      margin-top: 0;
    }

    button {
      border: 0;
      border-radius: 0.5rem;
      padding: 0.65rem 1rem;
      font-weight: 600;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Threat Intelligence Feed</h1>
      <p>Security news with on-demand research enrichment.</p>
    </div>
  </header>

  <main>
    <section class="status">
      <h2>Website deployed</h2>

      <p>
        The RSS feed has not been connected yet. This page confirms that
        the public frontend is working.
      </p>

      <button type="button" disabled>
        Tell me more
      </button>
    </section>
  </main>
</body>
</html>
